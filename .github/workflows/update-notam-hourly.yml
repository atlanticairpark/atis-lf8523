name: Update NOTAM (1 heure)
concurrency:
  group: git-sync
  cancel-in-progress: false
on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install requests edge-tts beautifulsoup4
      
      - name: Force NOTAM refresh
        env:
          ATIS_REMARQUES: ${{ secrets.ATIS_REMARQUES }}
          FORCE_NOTAM_REFRESH: "1"
        run: python script.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add index.html atis.mp3 notam_cache.json 2>/dev/null || true
          
          if ! git diff --quiet --staged; then
            git commit -m "🔄 ATIS update (NOTAM check)"
            
            for i in {1..5}; do
              git pull --rebase origin main && git push && break || sleep 5
            done
          else
            echo "Aucun changement détecté, rien à pousser."
          fi
